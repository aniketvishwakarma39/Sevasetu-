{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>

body {
    margin:0;
    padding:0;
    font-family: 'Arial', sans-serif;
}

/* MAIN CERTIFICATE */
.certificate {
    width: 1000px;
    height: 600px;
    position: relative;
background: url("{% static 'images/certificate_bg.jpeg' %}") no-repeat center;
background-size: cover;    background-size: cover;
}

/* NAME */
.name {
    position: absolute;
    top: 250px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 38px;
    font-weight: bold;
    margin-left: 160px;
    color: #2e7d32;
}

/* DATE */
.date {
    position: absolute;
    bottom: 80px;
    left: 200px;
    font-size: 14px;
    margin-left:-160px;
    margin-bottom: 40px;
}

.badge {
    position: absolute;
    top: 360px;
    left: 50%;
    margin-left: 170px;
    transform: translateX(-50%);
    font-size: 16px;
    color: #333;
}

</style>
</head>

<body>

<div class="certificate">

    <!-- NAME -->
    <div class="name">
        {{ user.username }}
    </div>

    <!-- BADGE -->
    <div class="badge">
        Achievement Level: {{ profile.badge }}
    </div>

    <!-- DATE -->
    <div class="date">
        Date: {{ today }}
    </div>

</div>

</body>
</html>
