<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - SevaSetu</title>

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container {
    background: rgba(255,255,255,0.1);
    padding:30px;
    border-radius:20px;
    width:320px;
    backdrop-filter: blur(12px);
    animation: fadeIn 1s ease;
}

h2 {
    text-align:center;
    margin-bottom:20px;
}

input {
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    outline:none;
}

.roles {
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

.role-btn {
    flex:1;
    margin:3px;
    padding:8px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    background:#ffffff22;
    color:white;
    transition:0.3s;
}

.role-btn:hover {
    background:#00ffd5;
    color:black;
}

.active {
    background:#00ffd5 !important;
    color:black !important;
}

button.submit {
    width:100%;
    padding:10px;
    border:none;
    background:#00ffd5;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button.submit:hover {
    background:#00c2a8;
    transform:scale(1.05);
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <h2>SevaSetu Login</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <!-- ROLE SELECT BUTTON UI -->
        <div class="roles">
            <button type="button" class="role-btn active" onclick="setRole('volunteer', this)">Volunteer</button>
            <button type="button" class="role-btn" onclick="setRole('creator', this)">Creator</button>
            <button type="button" class="role-btn" onclick="setRole('sponsor', this)">Sponsor</button>
        </div>

        <input type="hidden" name="role" id="roleInput" value="volunteer">

        <button type="submit" class="submit">Login</button>
    </form>
</div>
<p style="text-align:center;margin-top:10px;">
    New user? <a href="/signup/" style="color:#00ffd5;">Create Account</a>
</p>
<script>
function setRole(role, btn){
    document.getElementById("roleInput").value = role;

    let buttons = document.querySelectorAll(".role-btn");
    buttons.forEach(b => b.classList.remove("active"));

    btn.classList.add("active");
}
</script>

</body>
</html>
