<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>

<style>
body {
    font-family:'Segoe UI';
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.box {
    background: rgba(255,255,255,0.1);
    padding:30px;
    border-radius:15px;
    backdrop-filter: blur(10px);
    width:300px;
}

h2 {
    text-align:center;
    margin-bottom:20px;
}

input {
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
}

.roles {
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

.role-btn {
    flex:1;
    margin:3px;
    padding:8px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    background:#ffffff22;
    color:white;
}

.role-btn.active {
    background:#00ffd5;
    color:black;
}

button {
    width:100%;
    padding:10px;
    border:none;
    background:#00ffd5;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
    
    <h2>Create Account</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <input type="email" name="email" placeholder="enter mail" required>

        <div class="roles">
            <button type="button" class="role-btn active" onclick="setRole('volunteer', this)">Volunteer</button>
            <button type="button" class="role-btn" onclick="setRole('creator', this)">Creator</button>
            <button type="button" class="role-btn" onclick="setRole('sponsor', this)">Sponsor</button>
        </div>

        <input type="hidden" name="role" id="roleInput" value="volunteer">

        <button type="submit">Signup</button>
    </form>

    <p style="text-align:center;margin-top:10px;">
        Already have account? <a href="/login/" style="color:#00ffd5;">Login</a>
    </p>
</div>

<script>
function setRole(role, btn){
    document.getElementById("roleInput").value = role;

    let buttons = document.querySelectorAll(".role-btn");
    buttons.forEach(b => b.classList.remove("active"));

    btn.classList.add("active");
}
</script>

</body>
</html>
